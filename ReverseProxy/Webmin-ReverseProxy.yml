---
- name: Setup Webmin with Nginx reverse proxy and Lab Root CA
  hosts: reverseproxy
  become: yes
  gather_facts: yes

  vars:
    ssl_dir: /etc/nginx/ssl
    webmin_fqdn: webmin.dk-prod.lan
    webmin_deb_path: /tmp/webmin-latest.deb
    root_ca_path_remote: /opt/lab-ca/certs/rootCA.crt
    root_ca_path_local: /tmp/rootCA.crt

  pre_tasks:
    - name: Ensure python3-venv and pip are installed
      apt:
        name:
          - python3-venv
          - python3-pip
        state: present
        update_cache: yes

    - name: Create Python virtual environment for Ansible modules
      command: python3 -m venv /opt/ansible-venv
      args:
        creates: /opt/ansible-venv

    - name: Install community.crypto collection in venv
      command: /opt/ansible-venv/bin/ansible-galaxy collection install community.crypto --force

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - wget
          - apt-transport-https
          - curl
          - lsb-release
        state: present
        update_cache: yes

    - name: Download latest Webmin .deb dynamically
      get_url:
        url: https://www.webmin.com/download/webmin-current.deb
        dest: "{{ webmin_deb_path }}"
        mode: '0644'

    - name: Install Webmin
      apt:
        deb: "{{ webmin_deb_path }}"
        state: present

    - name: Disable Webmin SSL (Nginx handles SSL)
      lineinfile:
        path: /etc/webmin/miniserv.conf
        regexp: '^ssl='
        line: 'ssl=0'
        create: yes
      notify:
        - Restart Webmin

    - name: Create SSL directory
      file:
        path: "{{ ssl_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch Lab Root CA from CA server
      fetch:
        src: "{{ root_ca_path_remote }}"
        dest: "{{ root_ca_path_local }}"
        flat: yes
      delegate_to: ca-openssl

    - name: Copy Lab Root CA to reverse proxy trust store
      copy:
        src: "{{ root_ca_path_local }}"
        dest: /usr/local/share/ca-certificates/rootCA.crt
        mode: '0644'

    - name: Update trust store
      command: update-ca-certificates

    - name: Generate Webmin SSL key
      openssl_privatekey:
        path: "{{ ssl_dir }}/webmin.key"
        size: 4096

    - name: Generate Webmin CSR
      community.crypto.openssl_csr:
        path: "{{ ssl_dir }}/webmin.csr"
        privatekey_path: "{{ ssl_dir }}/webmin.key"
        common_name: "{{ webmin_fqdn }}"
        country_name: DK
        state_or_province_name: Denmark
        organization_name: dk-prod.lan

    - name: Sign Webmin certificate with Lab Root CA
      community.crypto.x509_certificate:
        path: "{{ ssl_dir }}/webmin.crt"
        csr_path: "{{ ssl_dir }}/webmin.csr"
        provider: ownca
        ownca_path: /usr/local/share/ca-certificates/rootCA.crt
        ownca_privatekey_path: "{{ ssl_dir }}/webmin.key"
        not_after: 2036-01-01T00:00:00

    - name: Configure Nginx site for Webmin
      copy:
        dest: /etc/nginx/sites-available/webmin
        content: |
          server {
              listen 443 ssl;
              server_name {{ webmin_fqdn }};

              ssl_certificate {{ ssl_dir }}/webmin.crt;
              ssl_certificate_key {{ ssl_dir }}/webmin.key;

              location / {
                  proxy_pass http://127.0.0.1:10000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      notify:
        - Reload Nginx

    - name: Enable Webmin site
      file:
        src: /etc/nginx/sites-available/webmin
        dest: /etc/nginx/sites-enabled/webmin
        state: link
      notify:
        - Reload Nginx

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

    - name: Restart Webmin
      service:
        name: webmin
        state: restarted
