---
- name: Deploy Reverse Proxy with SAN for All Backends
  hosts: reverseproxy
  become: yes
  gather_facts: yes

  vars:
    ca_host: 10.20.10.102
    ca_dir: /opt/lab-ca
    ssl_dir: /etc/nginx/ssl
    root_ca_name: rootCA
    backend_port: 80
    # List of backend servers: name + IP
    backends:
      - name: proxmox-node1
        ip: 10.20.10.11
      - name: proxmox-node2
        ip: 10.20.10.12
      - name: proxmox-node3
        ip: 10.20.10.13
      - name: zabbix
        ip: 10.20.10.101
      - name: ipam
        ip: 10.20.10.103
      - name: pbx
        ip: 10.20.10.113
      - name: log
        ip: 10.20.10.109
      - name: webmin
        ip: 10.20.10.115
      - name: web
        ip: 10.20.10.110
      - name: semaphore
        ip: 10.20.10.28

    # Compute domains list: "<name>.dk-prod.lan"
    backend_domains: "{{ backends | sort(attribute='ip') | map(attribute='name') | map('regex_replace', '(.*)', '\\1.dk-prod.lan') | list }}"

    # Main certificate CN / server_name
    domain_name: "{{ backend_domains[0] }}"

  tasks:

  #################################################
  # Install Required Packages
  #################################################
  - name: Install required packages
    apt:
      name:
        - nginx
        - openssl
        - ca-certificates
        - wget
        - perl
      state: present
      update_cache: yes

  #################################################
  # Create SSL Directory
  #################################################
  - name: Create SSL directory
    file:
      path: "{{ ssl_dir }}"
      state: directory
      mode: '0700'

  #################################################
  # Generate Private Key
  #################################################
  - name: Generate private key
    command: >
      openssl genrsa -out {{ ssl_dir }}/reverseproxy.key 4096
    args:
      creates: "{{ ssl_dir }}/reverseproxy.key"

  #################################################
  # Create OpenSSL SAN Config
  #################################################
  - name: Create OpenSSL SAN config
    copy:
      dest: "{{ ssl_dir }}/san.cnf"
      content: |
        [ req ]
        default_bits       = 4096
        default_md         = sha256
        prompt             = no
        distinguished_name = req_distinguished_name
        req_extensions     = v3_req

        [ req_distinguished_name ]
        C  = DK
        ST = Denmark
        O  = dk-prod.lan
        CN = {{ domain_name }}

        [ v3_req ]
        subjectAltName = @alt_names

        [ alt_names ]
        {% for domain in backend_domains %}
        DNS.{{ loop.index }} = {{ domain }}
        {% endfor %}

  #################################################
  # Generate CSR WITH SAN
  #################################################
  - name: Generate CSR with SAN
    command: >
      openssl req -new
      -key {{ ssl_dir }}/reverseproxy.key
      -out {{ ssl_dir }}/reverseproxy.csr
      -config {{ ssl_dir }}/san.cnf
    args:
      creates: "{{ ssl_dir }}/reverseproxy.csr"

  #################################################
  # Transfer CSR to CA Server
  #################################################
  - name: Read CSR from reverse proxy
    slurp:
      src: "{{ ssl_dir }}/reverseproxy.csr"
    register: csr_file

  - name: Write CSR to CA server
    copy:
      content: "{{ csr_file.content | b64decode }}"
      dest: "{{ ca_dir }}/reverseproxy.csr"
    delegate_to: "{{ ca_host }}"

  #################################################
  # Sign Certificate (copy SAN)
  #################################################
  - name: Sign certificate using root CA
    command: >
      openssl x509 -req
      -in {{ ca_dir }}/reverseproxy.csr
      -CA {{ ca_dir }}/certs/{{ root_ca_name }}.crt
      -CAkey {{ ca_dir }}/private/{{ root_ca_name }}.key
      -CAcreateserial
      -out {{ ca_dir }}/reverseproxy.crt
      -days 825
      -sha256
      -copy_extensions copy
    delegate_to: "{{ ca_host }}"
    args:
      creates: "{{ ca_dir }}/reverseproxy.crt"

  #################################################
  # Retrieve Signed Certificate
  #################################################
  - name: Read signed certificate from CA
    slurp:
      src: "{{ ca_dir }}/reverseproxy.crt"
    delegate_to: "{{ ca_host }}"
    register: signed_cert

  - name: Install signed certificate on reverse proxy
    copy:
      content: "{{ signed_cert.content | b64decode }}"
      dest: "{{ ssl_dir }}/reverseproxy.crt"
      mode: '0600'

  #################################################
  # Configure NGINX
  #################################################
  - name: Configure NGINX reverse proxy
    copy:
      dest: /etc/nginx/sites-available/reverseproxy
      content: |
        server {
            listen 443 ssl;
            server_name {{ domain_name }};

            ssl_certificate {{ ssl_dir }}/reverseproxy.crt;
            ssl_certificate_key {{ ssl_dir }}/reverseproxy.key;

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_prefer_server_ciphers on;

            location / {
                proxy_pass http://{{ backend_ip }}:{{ backend_port }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }

  - name: Enable NGINX site
    file:
      src: /etc/nginx/sites-available/reverseproxy
      dest: /etc/nginx/sites-enabled/reverseproxy
      state: link
      force: yes

  - name: Restart NGINX
    service:
      name: nginx
      state: restarted
      enabled: yes

  #################################################
  # Done
  #################################################
  - name: Show completion message
    debug:
      msg: |
        Reverse Proxy ready:
        CN: {{ domain_name }}
        SANs: {{ backend_domains | join(', ') }}
