---
- name: Deploy Reverse Proxy with Proper CA Signing
  hosts: reverseproxy
  become: yes
  gather_facts: yes

  vars:
    domain_name: reverseproxy.dk-prod.lan
    ca_host: 10.20.10.102
    ca_dir: /opt/lab-ca
    ssl_dir: /etc/nginx/ssl
    backend_ip: 10.20.10.200
    backend_port: 8080

  tasks:

  #################################################
  # Install Packages
  #################################################

  - name: Install required packages
    apt:
      name:
        - nginx
        - openssl
        - ca-certificates
        - wget
        - perl
      state: present
      update_cache: yes

  #################################################
  # Generate Key + CSR
  #################################################

  - name: Create SSL directory
    file:
      path: "{{ ssl_dir }}"
      state: directory
      mode: '0700'

  - name: Generate private key
    command: >
      openssl genrsa -out {{ ssl_dir }}/reverseproxy.key 4096
    args:
      creates: "{{ ssl_dir }}/reverseproxy.key"

  - name: Generate CSR
    command: >
      openssl req -new
      -key {{ ssl_dir }}/reverseproxy.key
      -out {{ ssl_dir }}/reverseproxy.csr
      -subj "/C=DK/ST=Denmark/O=dk-prod.lan/CN={{ domain_name }}"
    args:
      creates: "{{ ssl_dir }}/reverseproxy.csr"

  #################################################
  # Sign CSR using CA database (Proper Way)
  #################################################

  - name: Copy CSR to CA server
    copy:
      src: "{{ ssl_dir }}/reverseproxy.csr"
      dest: "{{ ca_dir }}/reverseproxy.csr"
      remote_src: yes
    delegate_to: "{{ ca_host }}"

  - name: Sign certificate using CA config and v3_server
    command: >
      openssl ca -batch
      -config {{ ca_dir }}/openssl.cnf
      -extensions v3_server
      -in {{ ca_dir }}/reverseproxy.csr
      -out {{ ca_dir }}/certs/reverseproxy.crt
      -days 825
    delegate_to: "{{ ca_host }}"
    args:
      creates: "{{ ca_dir }}/certs/reverseproxy.crt"

  - name: Fetch signed certificate
    fetch:
      src: "{{ ca_dir }}/certs/reverseproxy.crt"
      dest: "/tmp/reverseproxy.crt"
      flat: yes
    delegate_to: "{{ ca_host }}"
    run_once: true

  - name: Install signed certificate
    copy:
      src: "/tmp/reverseproxy.crt"
      dest: "{{ ssl_dir }}/reverseproxy.crt"

  #################################################
  # Configure NGINX (TLS termination only)
  #################################################

  - name: Configure NGINX reverse proxy
    copy:
      dest: /etc/nginx/sites-available/reverseproxy
      content: |
        server {
            listen 443 ssl;
            server_name {{ domain_name }};

            ssl_certificate {{ ssl_dir }}/reverseproxy.crt;
            ssl_certificate_key {{ ssl_dir }}/reverseproxy.key;

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_prefer_server_ciphers on;

            # TLS ends here
            location / {
                proxy_pass http://{{ backend_ip }}:{{ backend_port }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }

  - name: Enable NGINX site
    file:
      src: /etc/nginx/sites-available/reverseproxy
      dest: /etc/nginx/sites-enabled/reverseproxy
      state: link

  - name: Restart NGINX
    service:
      name: nginx
      state: restarted
      enabled: yes

  #################################################
  # Install Webmin
  #################################################

  - name: Download Webmin
    get_url:
      url: https://prdownloads.sourceforge.net/webadmin/webmin_2.105_all.deb
      dest: /tmp/webmin.deb

  - name: Install Webmin
    apt:
      deb: /tmp/webmin.deb

  - name: Ensure Webmin running
    service:
      name: webmin
      state: started
      enabled: yes

  #################################################
  # Done
  #################################################

  - name: Show completion
    debug:
      msg: |
        Reverse Proxy ready:
        https://{{ domain_name }}

        TLS terminates at reverse proxy.
        Backend servers use HTTP only.

        Webmin:
        https://10.20.10.115:10000
