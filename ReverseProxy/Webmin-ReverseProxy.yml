#################################################
# Generate private key
#################################################
- name: Generate private key
  command: "openssl genrsa -out {{ ssl_dir }}/{{ item.name }}.key 4096"
  args:
    creates: "{{ ssl_dir }}/{{ item.name }}.key"
  loop: "{{ backend_servers }}"
  loop_control:
    label: "{{ item.name }}"

#################################################
# Generate CSR
#################################################
- name: Generate CSR with SAN
  command: >
    openssl req -new
    -key {{ ssl_dir }}/{{ item.name }}.key
    -out {{ ssl_dir }}/{{ item.name }}.csr
    -subj "/C=DK/ST=Denmark/O=dk-prod.lan/CN={{ item.name }}.dk-prod.lan"
    -addext "subjectAltName=DNS:{{ item.name }}.dk-prod.lan"
  args:
    creates: "{{ ssl_dir }}/{{ item.name }}.csr"
  loop: "{{ backend_servers }}"
  loop_control:
    label: "{{ item.name }}"

#################################################
# Copy CSR to CA
#################################################
- name: Copy CSR to CA server
  copy:
    src: "{{ ssl_dir }}/{{ item.name }}.csr"
    dest: "{{ ca_dir }}/{{ item.name }}.csr"
  delegate_to: "{{ ca_host }}"
  loop: "{{ backend_servers }}"
  loop_control:
    label: "{{ item.name }}"

#################################################
# Sign certificate on CA
#################################################
- name: Sign CSR on CA server
  command: >
    openssl x509 -req
    -in {{ ca_dir }}/{{ item.name }}.csr
    -CA {{ ca_dir }}/certs/{{ root_ca_name }}.crt
    -CAkey {{ ca_dir }}/private/{{ root_ca_name }}.key
    -CAcreateserial
    -out {{ ca_dir }}/{{ item.name }}.crt
    -days 825
    -sha256
    -copy_extensions copy
  delegate_to: "{{ ca_host }}"
  args:
    creates: "{{ ca_dir }}/{{ item.name }}.crt"
  loop: "{{ backend_servers }}"
  loop_control:
    label: "{{ item.name }}"

#################################################
# Copy certificate back to reverse proxy
#################################################
- name: Copy signed certificate back
  copy:
    src: "{{ ca_dir }}/{{ item.name }}.crt"
    dest: "{{ ssl_dir }}/{{ item.name }}.crt"
    mode: '0600'
  delegate_to: "{{ ca_host }}"
  loop: "{{ backend_servers }}"
  loop_control:
    label: "{{ item.name }}"

#################################################
# Configure NGINX per backend
#################################################
- name: Configure NGINX reverse proxy
  copy:
    dest: /etc/nginx/sites-available/{{ item.name }}
    content: |
      server {
          listen 443 ssl;
          server_name {{ item.name }}.dk-prod.lan;

          ssl_certificate {{ ssl_dir }}/{{ item.name }}.crt;
          ssl_certificate_key {{ ssl_dir }}/{{ item.name }}.key;

          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers on;

          location / {
              proxy_pass http://{{ item.ip }}:{{ backend_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          }
      }
  loop: "{{ backend_servers }}"
  loop_control:
    label: "{{ item.name }}"

- name: Enable NGINX site
  file:
    src: /etc/nginx/sites-available/{{ item.name }}
    dest: /etc/nginx/sites-enabled/{{ item.name }}
    state: link
    force: yes
  loop: "{{ backend_servers }}"
  loop_control:
    label: "{{ item.name }}"
