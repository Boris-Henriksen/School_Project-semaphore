---
- name: Setup Reverse Proxy with Webmin SSL using Lab Root CA
  hosts: reverseproxy
  become: yes
  gather_facts: yes

  vars:
    # Paths
    ssl_dir: /etc/nginx/ssl
    nginx_sites_dir: /etc/nginx/sites-available
    nginx_sites_enabled: /etc/nginx/sites-enabled

    # CA info
    ca_server: 10.20.10.102
    root_ca_remote_path: /opt/lab-ca/certs/rootCA.crt
    root_ca_local_path: /usr/local/share/ca-certificates/rootCA.crt

    # Proxy info
    web_services:
      - name: webmin
        backend_host: 10.20.10.120
        backend_port: 10000
        fqdn: webmin.dk-prod.lan
      - name: graylog
        backend_host: 10.20.10.121
        backend_port: 9000
        fqdn: graylog.dk-prod.lan

  tasks:

    - name: Install required packages
      apt:
        name:
          - nginx
          - webmin
          - openssl
          - ca-certificates
        state: present
        update_cache: yes

    - name: Ensure SSL directory exists
      file:
        path: "{{ ssl_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch Lab Root CA from CA server
      fetch:
        src: "{{ root_ca_remote_path }}"
        dest: "/tmp/rootCA.crt"
        flat: yes
      delegate_to: "{{ ca_server }}"

    - name: Copy Root CA to system trust store
      copy:
        src: "/tmp/rootCA.crt"
        dest: "{{ root_ca_local_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Update CA certificates
      command: update-ca-certificates

    - name: Configure Nginx reverse proxy for web services
      block:
        - name: Create Nginx site config
          template:
            src: nginx_reverseproxy.j2
            dest: "{{ nginx_sites_dir }}/{{ item.name }}"
            owner: root
            group: root
            mode: '0644'
          loop: "{{ web_services }}"
          loop_control:
            label: "{{ item.name }}"

        - name: Enable Nginx sites
          file:
            src: "{{ nginx_sites_dir }}/{{ item.name }}"
            dest: "{{ nginx_sites_enabled }}/{{ item.name }}"
            state: link
          loop: "{{ web_services }}"
          loop_control:
            label: "{{ item.name }}"

      notify: Reload Nginx

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
