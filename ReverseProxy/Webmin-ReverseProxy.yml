---
- name: Setup NGINX Reverse Proxy with SSL
  hosts: reverseproxy
  become: yes
  vars:
    ssl_dir: /etc/nginx/ssl
    backend_servers:
      - name: webmin
        host: 10.20.10.115
        port: 10000
      - name: graylog
        host: 10.20.10.120
        port: 9000
    root_ca_remote_path: /opt/lab-ca/certs/rootCA.crt
    root_ca_local_path: "{{ ssl_dir }}/rootCA.crt"
    webmin_csr_path: "{{ ssl_dir }}/webmin.csr"
    webmin_key_path: "{{ ssl_dir }}/webmin.key"
    webmin_cert_path: "{{ ssl_dir }}/webmin.crt"
    webmin_common_name: webmin.dk-prod.lan
  tasks:

    - name: Install prerequisites
      apt:
        name:
          - nginx
          - python3-pip
          - unzip
        state: present
        update_cache: yes

    - name: Install community.crypto collection
      ansible.builtin.pip:
        name: "ansible-collection-community.crypto"
        executable: pip3

    - name: Create SSL directory
      file:
        path: "{{ ssl_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch Lab Root CA from CA server
      fetch:
        src: "{{ root_ca_remote_path }}"
        dest: "{{ root_ca_local_path }}"
        flat: yes
      delegate_to: ca-openssl

    - name: Generate reverse proxy private key
      community.crypto.openssl_privatekey:
        path: "{{ webmin_key_path }}"
        size: 4096

    - name: Generate reverse proxy CSR
      community.crypto.openssl_csr:
        path: "{{ webmin_csr_path }}"
        privatekey_path: "{{ webmin_key_path }}"
        common_name: "{{ webmin_common_name }}"
        country_name: DK
        organization_name: dk-prod.lan

    - name: Sign reverse proxy certificate with Lab Root CA
      community.crypto.x509_certificate:
        path: "{{ webmin_cert_path }}"
        csr_path: "{{ webmin_csr_path }}"
        provider: ownca
        ownca_path: "{{ ssl_dir }}/rootCA.crt"
        ownca_privatekey_path: "{{ ssl_dir }}/rootCA.key"
        not_after: 2036-01-01T00:00:00

    - name: Copy Root CA to system trust store
      copy:
        src: "{{ ssl_dir }}/rootCA.crt"
        dest: /usr/local/share/ca-certificates/rootCA.crt
        owner: root
        group: root
        mode: '0644'

    - name: Update CA certificates
      command: update-ca-certificates

    - name: Deploy NGINX reverse proxy configuration
      template:
        src: reverseproxy.conf.j2
        dest: /etc/nginx/sites-available/reverseproxy.conf

    - name: Enable NGINX site
      file:
        src: /etc/nginx/sites-available/reverseproxy.conf
        dest: /etc/nginx/sites-enabled/reverseproxy.conf
        state: link

    - name: Test NGINX configuration
      command: nginx -t

    - name: Reload NGINX
      service:
        name: nginx
        state: reloaded
