---
- name: Webmin Reverse Proxy SSL Setup
  hosts: reverseproxy_group  # avoid collision with host name
  become: yes
  vars:
    ssl_dir: /etc/nginx/ssl
    ca_dir: /etc/ssl/ca
    backend_servers:
      - { name: proxmox-node1, ip: 10.20.10.11 }
      - { name: proxmox-node2, ip: 10.20.10.12 }
      - { name: proxmox-node3, ip: 10.20.10.13 }
      - { name: zabbix, ip: 10.20.10.101 }
      - { name: ipam, ip: 10.20.10.103 }
      - { name: pbx, ip: 10.20.10.113 }
      - { name: log, ip: 10.20.10.109 }
      - { name: webmin, ip: 10.20.10.115 }
      - { name: web, ip: 10.20.10.110 }
      - { name: semaphore, ip: 10.20.10.28 }
    ca_host: ca-server   # your CA host

  tasks:

    - name: Ensure SSL directory exists
      file:
        path: "{{ ssl_dir }}"
        state: directory
        mode: "0755"

    - name: Generate private key per backend
      openssl_privatekey:
        path: "{{ ssl_dir }}/{{ item.name }}.key"
        size: 2048
      loop: "{{ backend_servers }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create OpenSSL config per backend
      copy:
        dest: "{{ ssl_dir }}/{{ item.name }}_openssl.cnf"
        content: |
          [ req ]
          distinguished_name = req_distinguished_name
          prompt = no
          [ req_distinguished_name ]
          CN = {{ item.name }}.{{ ansible_domain | default('local') }}
      loop: "{{ backend_servers }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Generate CSR per backend
      openssl_csr:
        path: "{{ ssl_dir }}/{{ item.name }}.csr"
        privatekey_path: "{{ ssl_dir }}/{{ item.name }}.key"
        common_name: "{{ item.name }}.{{ ansible_domain | default('local') }}"
      loop: "{{ backend_servers }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Copy CSR to CA server
      copy:
        src: "{{ ssl_dir }}/{{ item.name }}.csr"
        dest: "{{ ca_dir }}/{{ item.name }}.csr"
        remote_src: yes
      delegate_to: "{{ ca_host }}"
      loop: "{{ backend_servers }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Sign CSR on CA server
      command: >
        openssl x509 -req -in {{ ca_dir }}/{{ item.name }}.csr
        -CA {{ ca_dir }}/ca.crt -CAkey {{ ca_dir }}/ca.key -CAcreateserial
        -out {{ ca_dir }}/{{ item.name }}.crt -days 365 -sha256
      delegate_to: "{{ ca_host }}"
      loop: "{{ backend_servers }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Copy signed certificate back to reverseproxy
      copy:
        src: "{{ ca_dir }}/{{ item.name }}.crt"
        dest: "{{ ssl_dir }}/{{ item.name }}.crt"
        remote_src: yes
      delegate_to: "{{ ca_host }}"
      loop: "{{ backend_servers }}"
      loop_control:
        label: "{{ item.name }}"

    - name: List generated SSL files
      command: ls -l "{{ ssl_dir }}"
      register: ssl_list

    - name: Show SSL files
      debug:
        var: ssl_list.stdout_lines
