---
- name: Setup Webmin Reverse Proxy with SSL
  hosts: reverseproxy
  become: true
  gather_facts: true

  vars:
    ssl_dir: /etc/nginx/ssl
    webmin_host: webmin.dk-prod.lan
    lab_root_ca_path: /opt/lab-ca/certs/rootCA.crt  # on CA server
    webmin_port: 10000

  tasks:

    - name: Install prerequisites
      apt:
        name:
          - nginx
          - wget
          - unzip
          - gnupg
          - ca-certificates
        state: present
        update_cache: yes

    - name: Ensure SSL directory exists
      file:
        path: "{{ ssl_dir }}"
        state: directory
        mode: '0755'

    - name: Fetch Lab Root CA from CA server
      fetch:
        src: "{{ lab_root_ca_path }}"
        dest: "{{ ssl_dir }}/rootCA.crt"
        flat: yes
      delegate_to: ca-openssl

    - name: Trust Lab Root CA locally (for the reverse proxy)
      copy:
        src: "{{ ssl_dir }}/rootCA.crt"
        dest: /usr/local/share/ca-certificates/rootCA.crt
        mode: '0644'
    - name: Update CA certificates
      command: update-ca-certificates

    - name: Download latest stable Webmin .deb
      get_url:
        url: https://prdownloads.sourceforge.net/webadmin/webmin-current.deb
        dest: /tmp/webmin.deb
        mode: '0644'

    - name: Install Webmin
      apt:
        deb: /tmp/webmin.deb
        state: present

    - name: Disable Webmin internal SSL (we use Nginx)
      lineinfile:
        path: /etc/webmin/miniserv.conf
        regexp: '^ssl='
        line: 'ssl=0'
      notify: Restart Webmin

    - name: Configure Nginx reverse proxy for Webmin
      blockinfile:
        path: /etc/nginx/sites-available/webmin.conf
        create: yes
        block: |
          server {
              listen 443 ssl;
              server_name {{ webmin_host }};

              ssl_certificate {{ ssl_dir }}/rootCA.crt;
              ssl_certificate_key {{ ssl_dir }}/rootCA.crt;

              location / {
                  proxy_pass http://127.0.0.1:{{ webmin_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      notify:
        - Test and Reload Nginx

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/webmin.conf
        dest: /etc/nginx/sites-enabled/webmin.conf
        state: link
      notify:
        - Test and Reload Nginx

  handlers:
    - name: Test and Reload Nginx
      block:
        - name: Test Nginx configuration
          command: nginx -t
          register: nginx_test
          ignore_errors: yes

        - name: Reload Nginx if config valid
          service:
            name: nginx
            state: reloaded
          when: nginx_test.rc == 0

    - name: Restart Webmin
      service:
        name: webmin
        state: restarted
