---
- name: Deploy Multi-Backend Reverse Proxy with CA Signing
  hosts: reverseproxy
  become: yes
  vars:
    ca_host: 10.20.10.102
    ca_dir: /opt/lab-ca
    ssl_dir: /etc/nginx/ssl
    root_ca_name: rootCA
    domain_suffix: "dk-prod.lan"
    
    services:
      - { name: "proxmox-node1", ip: "10.20.10.11", port: 8006, proto: "https" }
      - { name: "proxmox-node2", ip: "10.20.10.12", port: 8006, proto: "https" }
      - { name: "proxmox-node3", ip: "10.20.10.13", port: 8006, proto: "https" }
      - { name: "zabbix", ip: "10.20.10.101", port: 80, proto: "http" }
      - { name: "ipam", ip: "10.20.10.103", port: 80, proto: "http" }
      - { name: "pbx", ip: "10.20.10.113", port: 80, proto: "http" }
      - { name: "log", ip: "10.20.10.109", port: 80, proto: "http" }
      - { name: "webmin", ip: "10.20.10.115", port: 10000, proto: "https" }
      - { name: "web", ip: "10.20.10.110", port: 80, proto: "http" }
      - { name: "semaphore", ip: "10.20.10.28", port: 3000, proto: "http" }
      - { name: "passbolt", ip: "10.20.10.116", port: 443, proto: "https" }

  tasks:
    - name: Install Nginx and OpenSSL
      apt:
        name: [nginx, openssl, ca-certificates]
        state: present
        update_cache: yes

    - name: Create SSL directory
      file:
        path: "{{ ssl_dir }}"
        state: directory
        mode: '0700'

    #################################################
    # SSL CERTIFICATE LOOP (Uses inner_ssl_tasks.yml)
    #################################################

    - name: Generate Keys, CSRs and Sign Certificates
      include_tasks: inner_ssl_tasks.yml
      loop: "{{ services }}"
      loop_control:
        loop_var: service

    #################################################
    # NGINX CONFIGURATION & CLEANUP
    #################################################

    - name: Remove default Nginx site to prevent 404 conflicts
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create Nginx configurations with Advanced Headers
      copy:
        dest: "/etc/nginx/sites-available/{{ item.name }}"
        content: |
          server {
              listen 443 ssl;
              server_name {{ item.name }}.{{ domain_suffix }};

              ssl_certificate {{ ssl_dir }}/{{ item.name }}.crt;
              ssl_certificate_key {{ ssl_dir }}/{{ item.name }}.key;

              # Optimering til store anmodninger
              client_max_body_size 0;

              location / {
                  proxy_pass {{ item.proto }}://{{ item.ip }}:{{ item.port }};
                  
                  # Kritiske headers til IPAM, PBX og Zabbix
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  # WebSocket support (Vigtigt for PBX og Proxmox shell)
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";

                  # Backend SSL indstillinger
                  proxy_ssl_verify off;
                  proxy_ssl_session_reuse on;
                  
                  # Timeout indstillinger for stabile forbindelser
                  proxy_read_timeout 90;
                  proxy_redirect off;
              }
          }
      loop: "{{ services }}"

    - name: Enable Nginx sites (Force symlinks)
      file:
        src: "/etc/nginx/sites-available/{{ item.name }}"
        dest: "/etc/nginx/sites-enabled/{{ item.name }}"
        state: link
        force: yes
      loop: "{{ services }}"
      notify: Restart Nginx

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
