---
- name: Deploy Reverse Proxy with SSL for Multiple Backends
  hosts: reverseproxy
  become: yes
  gather_facts: yes

  vars:
    ca_host: 10.20.10.102
    ca_dir: /opt/lab-ca
    ssl_dir: /etc/nginx/ssl
    root_ca_name: rootCA
    backend_port: 80
    backend_servers:
      - name: proxmox-node1
        ip: 10.20.10.11
      - name: proxmox-node2
        ip: 10.20.10.12
      - name: proxmox-node3
        ip: 10.20.10.13
      - name: zabbix
        ip: 10.20.10.101
      - name: ipam
        ip: 10.20.10.103
      - name: pbx
        ip: 10.20.10.113
      - name: log
        ip: 10.20.10.109
      - name: webmin
        ip: 10.20.10.115
      - name: web
        ip: 10.20.10.110
      - name: semaphore
        ip: 10.20.10.28

  tasks:

  #################################################
  # Install Required Packages
  #################################################
  - name: Install required packages
    apt:
      name:
        - nginx
        - openssl
        - ca-certificates
        - wget
        - perl
      state: present
      update_cache: yes

  #################################################
  # Create SSL Directory
  #################################################
  - name: Create SSL directory
    file:
      path: "{{ ssl_dir }}"
      state: directory
      mode: '0700'

  #################################################
  # Generate Private Keys per backend
  #################################################
  - name: Generate private key per backend
    command: "openssl genrsa -out {{ ssl_dir }}/{{ item.name }}.key 4096"
    args:
      creates: "{{ ssl_dir }}/{{ item.name }}.key"
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  #################################################
  # Create OpenSSL Config per backend
  #################################################
  - name: Create OpenSSL config per backend
    copy:
      dest: "{{ ssl_dir }}/{{ item.name }}_openssl.cnf"
      content: |
        [req]
        default_bits = 4096
        prompt = no
        default_md = sha256
        distinguished_name = dn
        req_extensions = v3_req

        [dn]
        C = DK
        ST = Denmark
        O = dk-prod.lan
        CN = {{ item.name }}.dk-prod.lan

        [v3_req]
        subjectAltName = @alt_names

        [alt_names]
        DNS.1 = {{ item.name }}.dk-prod.lan
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  #################################################
  # Generate CSR per backend
  #################################################
  - name: Generate CSR per backend
    command: >
      openssl req -new
      -key {{ ssl_dir }}/{{ item.name }}.key
      -out {{ ssl_dir }}/{{ item.name }}.csr
      -config {{ ssl_dir }}/{{ item.name }}_openssl.cnf
    args:
      creates: "{{ ssl_dir }}/{{ item.name }}.csr"
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  #################################################
  # Verify CSR files exist before copying
  #################################################
  - name: List generated CSRs
    command: ls -l {{ ssl_dir }}/
    register: csr_list

  - name: Show CSR files
    debug:
      var: csr_list.stdout_lines

  #################################################
  # Copy CSR to CA server
  #################################################
  - name: Copy CSR to CA server
    copy:
      src: "{{ ssl_dir }}/{{ item.name }}.csr"
      dest: "{{ ca_dir }}/{{ item.name }}.csr"
      remote_src: yes
    delegate_to: "{{ ca_host }}"
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  #################################################
  # Sign CSR on CA server
  #################################################
  - name: Sign CSR on CA server
    command: >
      openssl x509 -req
      -in {{ ca_dir }}/{{ item.name }}.csr
      -CA {{ ca_dir }}/certs/{{ root_ca_name }}.crt
      -CAkey {{ ca_dir }}/private/{{ root_ca_name }}.key
      -CAcreateserial
      -out {{ ca_dir }}/{{ item.name }}.crt
      -days 825
      -sha256
      -copy_extensions copy
    delegate_to: "{{ ca_host }}"
    args:
      creates: "{{ ca_dir }}/{{ item.name }}.crt"
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  #################################################
  # Copy signed certificate back to reverse proxy
  #################################################
  - name: Copy signed certificate back
    copy:
      src: "{{ ca_dir }}/{{ item.name }}.crt"
      dest: "{{ ssl_dir }}/{{ item.name }}.crt"
      mode: '0600'
      remote_src: yes
    delegate_to: "{{ ca_host }}"
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  #################################################
  # Configure NGINX per backend
  #################################################
  - name: Configure NGINX reverse proxy per backend
    copy:
      dest: /etc/nginx/sites-available/{{ item.name }}
      content: |
        server {
            listen 443 ssl;
            server_name {{ item.name }}.dk-prod.lan;

            ssl_certificate {{ ssl_dir }}/{{ item.name }}.crt;
            ssl_certificate_key {{ ssl_dir }}/{{ item.name }}.key;

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_prefer_server_ciphers on;

            location / {
                proxy_pass http://{{ item.ip }}:{{ backend_port }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  - name: Enable NGINX site per backend
    file:
      src: /etc/nginx/sites-available/{{ item.name }}
      dest: /etc/nginx/sites-enabled/{{ item.name }}
      state: link
      force: yes
    loop: "{{ backend_servers }}"
    loop_control:
      label: "{{ item.name }}"

  - name: Restart NGINX
    service:
      name: nginx
      state: restarted
      enabled: yes

  #################################################
  # Install Webmin
  #################################################
  - name: Download Webmin
    get_url:
      url: https://prdownloads.sourceforge.net/webadmin/webmin_2.105_all.deb
      dest: /tmp/webmin.deb

  - name: Install Webmin
    apt:
      deb: /tmp/webmin.deb

  - name: Ensure Webmin running
    service:
      name: webmin
      state: started
      enabled: yes

  #################################################
  # Completion Message
  #################################################
  - name: Show completion message
    debug:
      msg: |
        Reverse Proxy ready for all backend servers.
        TLS terminates at reverse proxy.
        Backend servers use HTTP only.
