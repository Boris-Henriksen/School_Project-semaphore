---
- name: Setup Webmin behind NGINX Reverse Proxy
  hosts: reverseproxy
  become: yes
  gather_facts: yes

  vars:
    ssl_dir: /etc/nginx/ssl
    lab_root_ca_path: /opt/lab-ca/certs/rootCA.crt
    webmin_url: "https://prdownloads.sourceforge.net/webadmin/webmin-current.deb"
    webmin_tmp: /tmp/webmin.deb

  tasks:

    - name: Install prerequisites
      apt:
        name:
          - wget
          - apt-transport-https
          - lsb-release
          - ca-certificates
          - gnupg
          - unzip
        state: present
        update_cache: yes

    - name: Download latest Webmin .deb
      get_url:
        url: "{{ webmin_url }}"
        dest: "{{ webmin_tmp }}"
        mode: '0755'

    - name: Install Webmin
      apt:
        deb: "{{ webmin_tmp }}"

    - name: Disable Webmin SSL (NGINX handles SSL)
      lineinfile:
        path: /etc/webmin/miniserv.conf
        regexp: '^ssl='
        line: 'ssl=0'
      notify: Restart Webmin

    - name: Ensure SSL directory exists
      file:
        path: "{{ ssl_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Fetch Lab Root CA from CA server to /tmp
      fetch:
        src: "{{ lab_root_ca_path }}"
        dest: "/tmp/rootCA.crt"
        flat: yes
      delegate_to: ca-openssl

    - name: Copy Lab Root CA to reverse proxy SSL directory
      copy:
        src: "/tmp/rootCA.crt"
        dest: "{{ ssl_dir }}/rootCA.crt"
        owner: root
        group: root
        mode: '0644'

    - name: Configure NGINX for Webmin reverse proxy
      block:
        - name: Install NGINX
          apt:
            name: nginx
            state: present
            update_cache: yes

        - name: Create NGINX Webmin config
          copy:
            dest: /etc/nginx/sites-available/webmin.conf
            content: |
              server {
                  listen 443 ssl;
                  server_name webmin.dk-prod.lan;

                  ssl_certificate {{ ssl_dir }}/rootCA.crt;
                  ssl_certificate_key {{ ssl_dir }}/rootCA.crt;

                  location / {
                      proxy_pass http://127.0.0.1:10000/;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
              }
          notify: Reload NGINX

        - name: Enable NGINX site
          file:
            src: /etc/nginx/sites-available/webmin.conf
            dest: /etc/nginx/sites-enabled/webmin.conf
            state: link
          notify: Reload NGINX

  handlers:
    - name: Reload NGINX
      service:
        name: nginx
        state: reloaded

    - name: Restart Webmin
      service:
        name: webmin
        state: restarted
