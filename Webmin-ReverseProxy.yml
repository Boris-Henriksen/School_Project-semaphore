---
- name: Setup Webmin on Reverse Proxy with SSL
  hosts: reverse-proxy
  become: yes
  gather_facts: yes

  vars:
    ssl_dir: /etc/nginx/ssl
    webmin_host: webmin.dk-prod.lan
    ca_server: CA-openssl          # Your CA VM host/group
    ca_cert_path: /opt/lab-ca/certs/rootCA.crt
    ca_key_path: /opt/lab-ca/private/rootCA.key
    webmin_ssl_key: "{{ ssl_dir }}/webmin.key"
    webmin_ssl_crt: "{{ ssl_dir }}/webmin.crt"
    webmin_ssl_csr: "{{ ssl_dir }}/webmin.csr"

  tasks:
    - name: Install prerequisites
      apt:
        name: "{{ item }}"
        state: present
        update_cache: yes
      loop:
        - wget
        - perl
        - apt-transport-https
        - gnupg
        - lsb-release

    - name: Ensure SSL directory exists
      file:
        path: "{{ ssl_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Get latest Webmin .deb filename dynamically
      shell: >
        wget -qO- https://sourceforge.net/projects/webadmin/files/webmin/
        | grep -Po 'webmin_\d+\.\d+_all\.deb' | sort -V | tail -1
      register: webmin_latest

    - name: Download latest Webmin .deb
      get_url:
        url: "https://prdownloads.sourceforge.net/webadmin/{{ webmin_latest.stdout }}"
        dest: /tmp/webmin.deb
        mode: '0644'

    - name: Install Webmin
      apt:
        deb: /tmp/webmin.deb

    - name: Copy Lab Root CA directly from CA server
      copy:
        src: "{{ ca_cert_path }}"
        dest: "{{ ssl_dir }}/rootCA.crt"
        owner: root
        group: root
        mode: '0644'
      delegate_to: "{{ ca_server }}"

    - name: Generate Webmin private key
      command: >
        openssl genrsa -out {{ webmin_ssl_key }} 4096
      args:
        creates: "{{ webmin_ssl_key }}"

    - name: Generate Webmin CSR
      command: >
        openssl req -new -key {{ webmin_ssl_key }}
        -subj "/C=DK/ST=Denmark/O=dk-prod.lan/CN={{ webmin_host }}"
        -out {{ webmin_ssl_csr }}
      args:
        creates: "{{ webmin_ssl_csr }}"

    - name: Sign Webmin certificate with Lab Root CA (from CA server)
      command: >
        openssl x509 -req -in {{ webmin_ssl_csr }}
        -CA {{ ca_cert_path }} -CAkey {{ ca_key_path }} -CAcreateserial
        -out {{ webmin_ssl_crt }} -days 365 -sha256
      args:
        creates: "{{ webmin_ssl_crt }}"
      delegate_to: "{{ ca_server }}"

    - name: Secure Webmin private key
      file:
        path: "{{ webmin_ssl_key }}"
        owner: root
        group: root
        mode: '0600'

    - name: Completion message
      debug:
        msg: "Webmin installed on {{ inventory_hostname }} with SSL ready at {{ webmin_host }}"
