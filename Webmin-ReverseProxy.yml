---
- name: Setup NGINX Reverse Proxy for Lab Web Services
  hosts: reverse-proxy
  become: yes
  gather_facts: yes

  vars:
    ssl_dir: /etc/nginx/ssl
    ca_cert_path: /opt/lab-ca/certs/rootCA.crt
    ca_key_path: /opt/lab-ca/private/rootCA.key
    reverse_proxy_domain: webmin.dk-prod.lan
    backend_servers:
      - name: webmin
        host: 10.20.10.115
        port: 10000   # Webmin default
      - name: graylog
        host: 10.20.10.120
        port: 9000    # Graylog web UI

  tasks:

    - name: Install prerequisites
      apt:
        name:
          - nginx
          - openssl
        state: present
        update_cache: yes

    - name: Create SSL directory
      file:
        path: "{{ ssl_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Generate Reverse Proxy private key
      openssl_privatekey:
        path: "{{ ssl_dir }}/{{ reverse_proxy_domain }}.key"
        size: 4096
        state: present

    - name: Generate Reverse Proxy self-signed certificate using Lab Root CA
      openssl_certificate:
        path: "{{ ssl_dir }}/{{ reverse_proxy_domain }}.crt"
        privatekey_path: "{{ ssl_dir }}/{{ reverse_proxy_domain }}.key"
        csr_path: "{{ ssl_dir }}/{{ reverse_proxy_domain }}.csr"
        provider: selfsigned
        subject:
          common_name: "{{ reverse_proxy_domain }}"
          organization_name: "dk-prod.lan"
          country_name: "DK"
        ownca_path: "{{ ca_cert_path }}"
        ownca_privatekey_path: "{{ ca_key_path }}"
        days: 825
      # This creates a certificate signed by your lab root CA

    - name: Deploy NGINX reverse proxy configuration
      template:
        src: reverseproxy.conf.j2
        dest: /etc/nginx/sites-available/{{ reverse_proxy_domain }}
        owner: root
        group: root
        mode: '0644'

    - name: Enable reverse proxy site
      file:
        src: /etc/nginx/sites-available/{{ reverse_proxy_domain }}
        dest: /etc/nginx/sites-enabled/{{ reverse_proxy_domain }}
        state: link

    - name: Remove default NGINX site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test NGINX configuration
      command: nginx -t

    - name: Reload NGINX
      service:
        name: nginx
        state: reloaded
