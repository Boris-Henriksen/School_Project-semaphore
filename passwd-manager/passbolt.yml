---
- name: Install Passbolt CE via official installer (non-interactive)
  hosts: passbolt
  become: true

  vars:
    # --- Database ---
    db_name: passbolt
    db_user: passboltadmin
    db_password: "Merc1234!"
    mysql_root_password: "Merc1234!"

    # --- Server / paths ---
    server_name: passbolt.dk-prod.lan
    php_timezone: Europe/Copenhagen

  tasks:

  # --------------------------------
  # Update system & install prerequisites
  # --------------------------------
  - name: Update apt cache
    ansible.builtin.apt:
      update_cache: yes

  - name: Install prerequisites
    ansible.builtin.apt:
      name:
        - curl
        - gnupg
        - lsb-release
        - ca-certificates
        - wget
      state: present

  # --------------------------------
  # Download official Passbolt installer
  # --------------------------------
  - name: Download Passbolt repo installer
    ansible.builtin.get_url:
      url: "https://download.passbolt.com/ce/installer/passbolt-repo-setup.ce.sh"
      dest: "/tmp/passbolt-repo-setup.ce.sh"
      mode: "0755"

  # --------------------------------
  # Run Passbolt installer (non-interactive)
  # --------------------------------
  - name: Run Passbolt repo installer (non-interactive)
    ansible.builtin.shell: >
      DEBIAN_FRONTEND=noninteractive bash /tmp/passbolt-repo-setup.ce.sh
    environment:
      DEBIAN_FRONTEND: noninteractive

  # --------------------------------
  # Install Passbolt CE Server package
  # --------------------------------
  - name: Install Passbolt CE Server
    ansible.builtin.apt:
      name: passbolt-ce-server
      state: present
      update_cache: yes

  # --------------------------------
  # Configure MariaDB (database & user)
  # --------------------------------
  - name: Set MariaDB root password
    community.mysql.mysql_user:
      name: root
      password: "{{ mysql_root_password }}"
      login_unix_socket: /var/run/mysqld/mysqld.sock
      check_implicit_admin: yes

  - name: Create Passbolt database
    community.mysql.mysql_db:
      name: "{{ db_name }}"
      state: present
      login_user: root
      login_password: "{{ mysql_root_password }}"

  - name: Create Passbolt DB user
    community.mysql.mysql_user:
      name: "{{ db_user }}"
      password: "{{ db_password }}"
      priv: "{{ db_name }}.*:ALL"
      state: present
      login_user: root
      login_password: "{{ mysql_root_password }}"
