---
- name: Setup Passbolt CE server med Nginx (Dynamisk PHP)
  hosts: passbolt
  become: true
  vars:
    db_name: "passbolt"
    db_user: "passboltadmin"
    db_password: "Merc1234!"
    mysql_root_password: "Merc1234!"
    server_name: "passbolt.dk-prod.lan"
    install_dir: "/var/www/passbolt"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install required packages (Generic names)
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - php-fpm
          - php-mysql
          - php-gd
          - php-cli
          - php-curl
          - php-mbstring
          - php-xml
          - php-gnupg  # Specifik for Passbolt
          - git
          - unzip
          - composer
        state: present

    - name: Get installed PHP version
      ansible.builtin.command: php -r "echo PHP_VERSION;"
      register: php_version_raw
      changed_when: false

    - name: Set PHP major.minor version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_raw.stdout | regex_search('^([0-9]+\\.[0-9]+)') }}"

    - name: Start services
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb
        - "php{{ php_version }}-fpm"

    - name: Ensure MariaDB root password
      ansible.builtin.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create Passbolt database
      ansible.builtin.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Create Passbolt DB user
      ansible.builtin.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Clone Passbolt CE repository
      ansible.builtin.git:
        repo: 'https://github.com'
        dest: '{{ install_dir }}'
        version: 'master'
        force: yes

    - name: Install Composer dependencies
      ansible.builtin.shell:
        cmd: composer install --no-dev --optimize-autoloader
        chdir: "{{ install_dir }}"
      become_user: www-data

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};
              root {{ install_dir }}/webroot;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php?$args;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }
          }
      notify: Restart Nginx

    - name: Enable site and remove default
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Cleanup default Nginx
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart Nginx

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted

