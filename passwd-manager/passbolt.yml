---
- name: Setup Passbolt server with Nginx
  hosts: passbolt
  become: true

  vars:
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "passboltadmin"
    passbolt_install_dir: "/var/www/passbolt"
    mysql_root_password: "Merc1234!"
    server_name: "passbolt.dk-prod.lan"
    php_timezone: "Europe/Copenhagen"

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - php-fpm
          - php-cli
          - php-mysql
          - php-gd
          - php-curl
          - php-mbstring
          - php-xml
          - php-intl
          - php-zip
          - php-bcmath
          - php-gmp
          - php-pear
          - unzip
          - wget
          - git
          - gnupg
        state: present

    - name: Start and enable Nginx and MariaDB
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Ensure MariaDB root password is set
      ansible.builtin.command: >
        mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}';"

    - name: Create Passbolt database
      ansible.builtin.command: >
        mysql -uroot -p'{{ mysql_root_password }}'
        -e "CREATE DATABASE IF NOT EXISTS {{ passbolt_db_name }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

    - name: Create Passbolt database user
      ansible.builtin.command: >
        mysql -uroot -p'{{ mysql_root_password }}'
        -e "CREATE USER IF NOT EXISTS '{{ passbolt_db_user }}'@'localhost' IDENTIFIED BY '{{ passbolt_db_password }}';
        GRANT ALL PRIVILEGES ON {{ passbolt_db_name }}.* TO '{{ passbolt_db_user }}'@'localhost';
        FLUSH PRIVILEGES;"

    - name: Get latest Passbolt release
      ansible.builtin.uri:
        url: https://api.github.com/repos/passbolt/passbolt_api/releases/latest
        return_content: yes
      register: passbolt_release

    - name: Set Passbolt version
      ansible.builtin.set_fact:
        passbolt_version: "{{ passbolt_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Show Passbolt version
      ansible.builtin.debug:
        msg: "Installing Passbolt version {{ passbolt_version }}"

    - name: Download Passbolt
      ansible.builtin.get_url:
        url: "https://github.com/passbolt/passbolt_api/releases/download/v{{ passbolt_version }}/passbolt-ce-{{ passbolt_version }}.tar.gz"
        dest: /tmp/passbolt.tar.gz

    - name: Extract Passbolt
      ansible.builtin.unarchive:
        src: /tmp/passbolt.tar.gz
        dest: /var/www/
        remote_src: yes

    - name: Rename Passbolt directory
      ansible.builtin.command:
        cmd: mv /var/www/passbolt-ce-{{ passbolt_version }} {{ passbolt_install_dir }}
      args:
        creates: "{{ passbolt_install_dir }}"

    - name: Set ownership for Nginx
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Get installed PHP version
      ansible.builtin.command: php -r "echo PHP_VERSION;"
      register: php_version_raw

    - name: Set PHP major.minor version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_raw.stdout | regex_search('^([0-9]+\\.[0-9]+)') }}"

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
        state: present
      notify: Restart PHP-FPM

    - name: Create Passbolt config
      ansible.builtin.copy:
        src: "{{ passbolt_install_dir }}/config/passbolt.default.php"
        dest: "{{ passbolt_install_dir }}/config/passbolt.php"
        owner: www-data
        group: www-data
        mode: '0640'
        remote_src: yes

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ passbolt_install_dir }}/webroot;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php?$args;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:

    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
```
