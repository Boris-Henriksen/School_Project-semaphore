---
- name: Setup Passbolt on Ubuntu 24.04
  hosts: passbolt
  become: true
  vars:
    # Database
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Pass1234!"
    mysql_root_password: "Root1234!"

    # Passbolt
    passbolt_install_dir: "/var/www/passbolt"
    passbolt_repo_api: "https://api.github.com/repos/passbolt/passbolt/releases/latest"

    # PHP
    php_version: "8.3"
    php_timezone: "Europe/Copenhagen"

    # System
    venv_path: "/opt/passbolt_venv"
    server_name: "passbolt.dk-prod.lan"

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - php{{ php_version }}-fpm
          - php{{ php_version }}-cli
          - php{{ php_version }}-mysql
          - php{{ php_version }}-gd
          - php{{ php_version }}-mbstring
          - php{{ php_version }}-curl
          - php{{ php_version }}-xml
          - php{{ php_version }}-zip
          - php{{ php_version }}-bcmath
          - php{{ php_version }}-gnupg
          - git
          - curl
          - unzip
          - python3-venv
          - python3-pip
        state: present

    - name: Start and enable Nginx and MariaDB
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Set MariaDB root password (Debian/Ubuntu safe)
      ansible.builtin.shell: |
        mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}';"
      args:
        warn: false

    - name: Create Passbolt database
      ansible.builtin.shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "CREATE DATABASE IF NOT EXISTS {{ passbolt_db_name }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
      args:
        warn: false

    - name: Create Passbolt database user
      ansible.builtin.shell: |
        mysql -uroot -p'{{ mysql_root_password }}' -e "CREATE USER IF NOT EXISTS '{{ passbolt_db_user }}'@'localhost' IDENTIFIED BY '{{ passbolt_db_password }}'; GRANT ALL PRIVILEGES ON {{ passbolt_db_name }}.* TO '{{ passbolt_db_user }}'@'localhost'; FLUSH PRIVILEGES;"
      args:
        warn: false

    - name: Create virtual environment for Passbolt
      ansible.builtin.python_requirements:
        virtualenv: "{{ venv_path }}"
        virtualenv_command: python3 -m venv
        state: present

    - name: Fetch latest Passbolt release info
      ansible.builtin.uri:
        url: "{{ passbolt_repo_api }}"
        return_content: yes
      register: passbolt_release

    - name: Set latest Passbolt version
      ansible.builtin.set_fact:
        passbolt_version: "{{ passbolt_release.json.tag_name }}"

    - name: Download latest Passbolt tarball
      ansible.builtin.get_url:
        url: "https://github.com/passbolt/passbolt/releases/download/{{ passbolt_version }}/passbolt-ce-{{ passbolt_version }}.tar.gz"
        dest: "/tmp/passbolt.tar.gz"

    - name: Extract Passbolt
      ansible.builtin.unarchive:
        src: "/tmp/passbolt.tar.gz"
        dest: "{{ passbolt_install_dir }}"
        remote_src: yes
        creates: "{{ passbolt_install_dir }}/index.php"

    - name: Set ownership
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Install Passbolt dependencies inside virtualenv
      ansible.builtin.shell: |
        source {{ venv_path }}/bin/activate
        composer install --no-dev --no-interaction --optimize-autoloader
      args:
        chdir: "{{ passbolt_install_dir }}"
        warn: false
        executable: /bin/bash

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
        state: present
      notify: Restart PHP-FPM

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ passbolt_install_dir }};
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
