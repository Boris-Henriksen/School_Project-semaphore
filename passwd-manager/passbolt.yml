---
- name: Setup Passbolt server with Nginx
  hosts: passbolt
  become: true

  vars:
    passbolt_install_dir: "/var/www/passbolt"
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "PassboltDB123!"
    mysql_root_password: "Merc1234!"
    server_name: "passbolt.dk-prod.lan"
    php_timezone: "Europe/Copenhagen"

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - git
          - unzip
          - curl
          - php-fpm
          - php-cli
          - php-mysql
          - php-mbstring
          - php-xml
          - php-gd
          - php-curl
          - php-intl
          - php-zip
          - php-bcmath
          - php-gmp
          - composer
          - gnupg
        state: present

    - name: Install MySQL python library
      ansible.builtin.apt:
        name: python3-pymysql
        state: present

    - name: Start and enable services
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Set MariaDB root password
      ansible.builtin.command: >
        mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}';"
      ignore_errors: yes

    - name: Create Passbolt database
      community.mysql.mysql_db:
        name: "{{ passbolt_db_name }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Create Passbolt database user
      community.mysql.mysql_user:
        name: "{{ passbolt_db_user }}"
        password: "{{ passbolt_db_password }}"
        priv: "{{ passbolt_db_name }}.*:ALL"
        host: "localhost"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Clone Passbolt repository
      ansible.builtin.git:
        repo: https://github.com/passbolt/passbolt_api.git
        dest: "{{ passbolt_install_dir }}"
        version: master

    - name: Install Passbolt dependencies with composer
      ansible.builtin.command: composer install --no-dev
      args:
        chdir: "{{ passbolt_install_dir }}"

    - name: Set ownership for web server
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Generate GPG key for Passbolt
      ansible.builtin.command: >
        gpg --batch --passphrase '' --quick-gen-key passbolt@localhost default default never
      become_user: www-data
      ignore_errors: yes

    - name: Get installed PHP version
      ansible.builtin.command: php -r "echo PHP_VERSION;"
      register: php_version_raw

    - name: Set PHP version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_raw.stdout | regex_search('^([0-9]+\\.[0-9]+)') }}"

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone'
        line: "date.timezone = {{ php_timezone }}"
      notify: Restart PHP

    - name: Configure Nginx site
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ passbolt_install_dir }}/webroot;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php?$query_string;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:

    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
