---
- name: Install Passbolt CE on Ubuntu 24
  hosts: passbolt
  become: true
  vars:
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Merc1234!"
    passbolt_install_dir: "/var/www/passbolt"
    mysql_root_password: "Merc1234!"
    server_name: "passbolt.dk-prod.lan"
    php_timezone: "Europe/Copenhagen"
    passbolt_release_api: "https://api.github.com/repos/passbolt/passbolt/releases/latest"

  pre_tasks:
    - name: Ensure Python MySQL library is installed
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-dev
          - libmysqlclient-dev
        state: present

    - name: Ensure mysqlclient is installed for Ansible
      ansible.builtin.pip:
        name: mysqlclient

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - wget
          - unzip
          - git
          - curl
          - gnupg
        state: present

    - name: Get latest PHP FPM version available
      ansible.builtin.shell: |
        apt-cache search php | grep -E '^php[0-9]+\.[0-9]+-fpm' | awk '{print $1}' | sort -V | tail -n1
      register: php_latest
      changed_when: false

    - name: Set PHP version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_latest.stdout | regex_search('php([0-9]+\\.[0-9]+)-fpm', '\\1') }}"

    - name: Install PHP and required extensions dynamically
      ansible.builtin.apt:
        name:
          - "php{{ php_version }}-fpm"
          - "php{{ php_version }}-mysql"
          - "php{{ php_version }}-gd"
          - "php{{ php_version }}-curl"
          - "php{{ php_version }}-mbstring"
          - "php{{ php_version }}-xml"
          - "php{{ php_version }}-bcmath"
          - "php{{ php_version }}-intl"
          - "php{{ php_version }}-zip"
          - "php{{ php_version }}-gnupg"
          - "php{{ php_version }}-gmp"
        state: present

    - name: Start and enable Nginx and MariaDB
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Ensure MariaDB root password is set
      community.mysql.mysql_user:
        login_user: root
        login_password: ''
        name: root
        host: localhost
        password: "{{ mysql_root_password }}"
        check_implicit_admin: yes
        priv: "*.*:ALL,GRANT"

    - name: Create Passbolt database
      community.mysql.mysql_db:
        name: "{{ passbolt_db_name }}"
        encoding: utf8
        collation: utf8_general_ci
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Create Passbolt database user
      community.mysql.mysql_user:
        name: "{{ passbolt_db_user }}"
        password: "{{ passbolt_db_password }}"
        priv: "{{ passbolt_db_name }}.*:ALL"
        host: localhost
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Get latest Passbolt CE release download URL
      ansible.builtin.uri:
        url: "{{ passbolt_release_api }}"
        return_content: yes
      register: passbolt_release

    - name: Set Passbolt download URL
      ansible.builtin.set_fact:
        passbolt_download_url: "{{ (passbolt_release.json.assets | selectattr('name','match','passbolt-ce-.*.tar.gz') | list)[0].browser_download_url }}"
        passbolt_version: "{{ passbolt_release.json.tag_name }}"

    - name: Download Passbolt latest release
      ansible.builtin.get_url:
        url: "{{ passbolt_download_url }}"
        dest: "/tmp/passbolt.tar.gz"

    - name: Create Passbolt install directory
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Extract Passbolt
      ansible.builtin.unarchive:
        src: "/tmp/passbolt.tar.gz"
        dest: "{{ passbolt_install_dir }}"
        remote_src: yes
        extra_opts: [--strip-components=1]

    - name: Install Composer
      ansible.builtin.get_url:
        url: https://getcomposer.org/installer
        dest: /tmp/composer-setup.php
        mode: "0755"

    - name: Run Composer install for Passbolt
      ansible.builtin.shell: |
        php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer
      args:
        creates: /usr/local/bin/composer

    - name: Install Passbolt dependencies
      ansible.builtin.shell: |
        composer install --no-dev --no-interaction --optimize-autoloader --ignore-platform-req=ext-gnupg
      args:
        chdir: "{{ passbolt_install_dir }}"
        creates: "{{ passbolt_install_dir }}/vendor"

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
        state: present
      notify: Restart PHP-FPM

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};
              root {{ passbolt_install_dir }};
              index index.php;
              location / {
                  try_files $uri $uri/ /index.php?$query_string;
              }
              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }
              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
