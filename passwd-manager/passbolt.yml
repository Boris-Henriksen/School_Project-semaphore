---
- name: Setup Passbolt CE server
  hosts: passbolt
  become: true
  vars:
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Merc1234!"
    mysql_root_password: "Merc1234!"
    passbolt_install_dir: "/var/www/passbolt"
    server_name: "passbolt.dk-prod.lan"
    php_timezone: "Europe/Copenhagen"

    # PHP packages for Ubuntu 24
    php_packages:
      - php-cli
      - php-fpm
      - php-mysql
      - php-gd
      - php-curl
      - php-mbstring
      - php-xml
      - php-bcmath
      - php-zip
      - php-intl
      - php-gnupg
      - php-gmp
      - php-soap

  vars_prompt:
    # Optional: you can prompt for db root if not using a hardcoded password
    - name: "mysql_root_password"
      prompt: "Enter MariaDB root password"
      private: yes
      default: "Merc1234!"

  tasks:

    - name: Ensure Python 3 MySQL client is installed
      ansible.builtin.apt:
        name: python3-mysqlclient
        state: present
        update_cache: yes

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - git
          - unzip
          - wget
          - curl
          - composer
        state: present

    - name: Install PHP packages
      ansible.builtin.apt:
        name: "{{ php_packages }}"
        state: present
        update_cache: yes

    - name: Start and enable Nginx and MariaDB
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Ensure MariaDB root password is set
      ansible.builtin.mysql_user:
        login_user: root
        login_password: ""
        user: root
        host_all: true
        password: "{{ mysql_root_password }}"
        check_implicit_admin: yes
        state: present

    - name: Create Passbolt database
      ansible.builtin.mysql_db:
        name: "{{ passbolt_db_name }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"
        encoding: utf8mb4
        collation: utf8mb4_unicode_ci

    - name: Create Passbolt database user
      ansible.builtin.mysql_user:
        name: "{{ passbolt_db_user }}"
        password: "{{ passbolt_db_password }}"
        priv: "{{ passbolt_db_name }}.*:ALL"
        host: localhost
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Clone latest Passbolt CE repository
      ansible.builtin.git:
        repo: "https://github.com/passbolt/passbolt_api.git"
        dest: "{{ passbolt_install_dir }}"
        version: "ce"    # Passbolt CE default branch
        force: yes
        update: yes

    - name: Set ownership of Passbolt files
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Get installed PHP version
      ansible.builtin.command: php -r "echo PHP_VERSION;"
      register: php_version_raw

    - name: Set PHP major.minor version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_raw.stdout | regex_search('^([0-9]+\\.[0-9]+)') }}"

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
      notify: Restart PHP-FPM

    - name: Install Passbolt dependencies with Composer
      ansible.builtin.command:
        cmd: composer install --no-dev --no-interaction --optimize-autoloader
        chdir: "{{ passbolt_install_dir }}"
        environment:
          COMPOSER_ALLOW_SUPERUSER: "1"
      args:
        creates: "{{ passbolt_install_dir }}/vendor"

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ passbolt_install_dir }};
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
