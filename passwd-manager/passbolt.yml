---
- name: Install Passbolt on Ubuntu 24 dynamically
  hosts: passbolt
  become: true
  vars:
    passbolt_version: "latest"
    passbolt_install_dir: "/var/www/passbolt"
    mysql_root_password: "Merc1234!"
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Merc1234!"
    php_timezone: "Europe/Copenhagen"
    server_name: "passbolt.dk-prod.lan"

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist

    - name: Install base dependencies
      ansible.builtin.apt:
        name:
          - gnupg
          - lsb-release
          - curl
          - unzip
          - wget
          - git
          - mariadb-server
          - software-properties-common
        state: present

    - name: Get latest PHP version available
      ansible.builtin.shell: >
        apt-cache search '^php[0-9]\.[0-9]-fpm$' |
        awk '{print $1}' |
        sed -E 's/^php([0-9]\.[0-9])-fpm$/\1/' |
        sort -V | tail -1
      register: php_version_result
      changed_when: false

    - name: Set PHP version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_result.stdout }}"

    - name: Install PHP and required extensions
      ansible.builtin.apt:
        name:
          - "php{{ php_version }}"
          - "php{{ php_version }}-fpm"
          - "php{{ php_version }}-cli"
          - "php{{ php_version }}-mysql"
          - "php{{ php_version }}-xml"
          - "php{{ php_version }}-mbstring"
          - "php{{ php_version }}-curl"
          - "php{{ php_version }}-gd"
          - "php{{ php_version }}-bcmath"
          - "php{{ php_version }}-intl"
          - "php{{ php_version }}-gnupg"
        state: present
        update_cache: yes

    - name: Start and enable MariaDB and PHP-FPM
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - mariadb
        - "php{{ php_version }}-fpm"

    - name: Ensure MariaDB root password is set
      community.mysql.mysql_user:
        login_user: root
        login_password: ""
        name: root
        host_all: yes
        password: "{{ mysql_root_password }}"
        check_implicit_admin: yes
        state: present

    - name: Create Passbolt database
      community.mysql.mysql_db:
        name: "{{ passbolt_db_name }}"
        encoding: utf8mb4
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Create Passbolt database user
      community.mysql.mysql_user:
        name: "{{ passbolt_db_user }}"
        password: "{{ passbolt_db_password }}"
        priv: "{{ passbolt_db_name }}.*:ALL"
        host: localhost
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Clone Passbolt repository
      ansible.builtin.git:
        repo: "https://github.com/passbolt/passbolt_api.git"
        dest: "{{ passbolt_install_dir }}"
        version: "v5.10.0"   # Replace with latest stable version if needed
        recursive: yes

    - name: Install Composer
      ansible.builtin.shell: |
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      args:
        creates: /usr/local/bin/composer

    - name: Install Passbolt dependencies with Composer
      ansible.builtin.shell: |
        COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --no-interaction --optimize-autoloader
      args:
        chdir: "{{ passbolt_install_dir }}"

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
      notify: Restart PHP-FPM

    - name: Set ownership of Passbolt directory
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};
              root {{ passbolt_install_dir }}/webroot;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php?$args;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted

    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
