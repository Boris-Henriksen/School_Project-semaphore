---
- name: Install Passbolt on Ubuntu 24
  hosts: passbolt
  become: true
  vars:
    passbolt_install_dir: /var/www/passbolt
    mysql_root_password: "Merc1234!"
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Merc1234!"
    php_timezone: "Europe/Copenhagen"
    server_name: "passbolt.dk-prod.lan"

  pre_tasks:
    - name: Ensure python3-pip is installed
      ansible.builtin.apt:
        name: python3-pip
        state: present
        update_cache: yes

    - name: Ensure Python MySQL client is installed for Ansible
      ansible.builtin.pip:
        name: mysqlclient
        executable: pip3

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - software-properties-common
          - lsb-release
          - unzip
          - wget
          - curl
          - gnupg
          - ca-certificates
        state: present

    - name: Add PHP repository
      ansible.builtin.apt_repository:
        repo: ppa:ondrej/php
        state: present
        update_cache: yes

    - name: Install latest PHP and required extensions
      ansible.builtin.apt:
        name:
          - php8.3-fpm
          - php8.3-mysql
          - php8.3-gd
          - php8.3-curl
          - php8.3-mbstring
          - php8.3-xml
          - php8.3-bcmath
          - php8.3-intl
          - php8.3-zip
          - php8.3-gnupg
          - php8.3-gmp
        state: present

    - name: Start and enable Nginx and MariaDB
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Ensure MariaDB root password is set
      ansible.builtin.mysql_user:
        login_user: root
        login_password: ""
        user: root
        password: "{{ mysql_root_password }}"
        host_all: yes
        check_implicit_admin: yes
        login_unix_socket: /var/run/mysqld/mysqld.sock
        state: present

    - name: Create Passbolt database
      ansible.builtin.mysql_db:
        name: "{{ passbolt_db_name }}"
        encoding: utf8
        collation: utf8_general_ci
        login_user: root
        login_password: "{{ mysql_root_password }}"
        state: present

    - name: Create Passbolt database user
      ansible.builtin.mysql_user:
        name: "{{ passbolt_db_user }}"
        password: "{{ passbolt_db_password }}"
        priv: "{{ passbolt_db_name }}.*:ALL"
        host: localhost
        login_user: root
        login_password: "{{ mysql_root_password }}"
        state: present

    - name: Get latest Passbolt release from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/passbolt/passbolt/releases/latest
        return_content: yes
      register: github_release

    - name: Set latest Passbolt version fact
      ansible.builtin.set_fact:
        passbolt_version: "{{ github_release.json.tag_name | regex_replace('^v','') }}"

    - name: Set Passbolt download URL
      ansible.builtin.set_fact:
        passbolt_download_url: "{{ github_release.json.assets | selectattr('name','search','passbolt-ce-.*\\.zip') | map(attribute='browser_download_url') | first }}"

    - name: Ensure Passbolt install directory exists
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Download Passbolt latest release zip
      ansible.builtin.get_url:
        url: "{{ passbolt_download_url }}"
        dest: "/tmp/passbolt.zip"

    - name: Extract Passbolt
      ansible.builtin.unarchive:
        src: "/tmp/passbolt.zip"
        dest: "{{ passbolt_install_dir }}"
        remote_src: yes
        copy: no
        owner: www-data
        group: www-data

    - name: Install Composer dependencies
      ansible.builtin.shell: |
        export COMPOSER_ALLOW_SUPERUSER=1
        composer install --no-dev --no-interaction --optimize-autoloader
      args:
        chdir: "{{ passbolt_install_dir }}"
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/8.3/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
        state: present
      notify: Restart PHP-FPM

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ passbolt_install_dir }}/webroot;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php8.3-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: php8.3-fpm
        state: restarted
