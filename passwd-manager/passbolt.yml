---
- name: Install Passbolt CE server (official installer)
  hosts: passbolt
  become: true
  vars:
    db_name: passbolt
    db_user: passboltadmin
    db_password: "Merc1234!"
    mysql_root_password: "Merc1234!"
    server_name: passbolt.dk-prod.lan
    php_timezone: "Europe/Copenhagen"
    # Distributions argument for installer: focal (Ubuntu 20.04/22.04)
    passbolt_dist: "focal"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - lsb-release
          - ca-certificates
          - wget
        state: present

    - name: Download Passbolt installer script
      ansible.builtin.get_url:
        url: "https://download.passbolt.com/ce/installer/passbolt-repo-setup.ce.sh"
        dest: "/tmp/passbolt-repo-setup.ce.sh"
        mode: "0755"

    - name: Download SHA512 sum for installer
      ansible.builtin.get_url:
        url: "https://github.com/passbolt/passbolt-dep-scripts/releases/latest/download/passbolt-ce-SHA512SUM.txt"
        dest: "/tmp/passbolt-ce-SHA512SUM.txt"

    - name: Verify installer checksum
      ansible.builtin.command:
        cmd: "sha512sum -c /tmp/passbolt-ce-SHA512SUM.txt"
      args:
        chdir: /tmp

    - name: Run Passbolt repo installer script
      ansible.builtin.shell: >
        DEBIAN_FRONTEND=noninteractive bash /tmp/passbolt-repo-setup.ce.sh {{ passbolt_dist }}
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Update apt cache after adding repo
      ansible.builtin.apt:
        update_cache: yes

    - name: Install Passbolt CE Server
      ansible.builtin.apt:
        name: passbolt-ce-server
        state: present

    # MariaDB setup at end
    - name: Set MariaDB root password
      community.mysql.mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock
        check_implicit_admin: yes

    - name: Create Passbolt database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Create Passbolt DB user
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"
