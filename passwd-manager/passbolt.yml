---
- name: Install Passbolt CE (Dynamic Latest Release)
  hosts: passbolt
  become: true

  vars:
    db_name: passbolt
    db_user: passboltadmin
    db_password: "Merc1234!"
    mysql_root_password: "Merc1234!"

    server_name: passbolt.dk-prod.lan
    install_dir: /var/www/passbolt
    php_timezone: Europe/Copenhagen

  tasks:

  # --------------------------------
  # Install base packages
  # --------------------------------
  - name: Update apt cache
    ansible.builtin.apt:
      update_cache: yes

  - name: Install required packages
    ansible.builtin.apt:
      name:
        - nginx
        - mariadb-server
        - python3-pymysql
        - gnupg
        - unzip
        - curl

        - php-fpm
        - php-cli
        - php-mysql
        - php-gd
        - php-curl
        - php-mbstring
        - php-xml
        - php-gnupg
        - php-intl
        - php-zip
        - php-bcmath
      state: present

  # --------------------------------
  # Detect PHP version
  # --------------------------------
  - name: Detect PHP version
    ansible.builtin.command: php -r "echo PHP_MAJOR_VERSION.'.'.PHP_MINOR_VERSION;"
    register: php_version_raw
    changed_when: false

  - name: Set PHP version fact
    ansible.builtin.set_fact:
      php_version: "{{ php_version_raw.stdout }}"

  # --------------------------------
  # Start required services
  # --------------------------------
  - name: Start services
    ansible.builtin.service:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop:
      - nginx
      - mariadb
      - "php{{ php_version }}-fpm"

  # --------------------------------
  # Configure MariaDB
  # --------------------------------
  - name: Set MariaDB root password
    community.mysql.mysql_user:
      name: root
      password: "{{ mysql_root_password }}"
      login_unix_socket: /var/run/mysqld/mysqld.sock
      check_implicit_admin: yes

  - name: Create Passbolt database
    community.mysql.mysql_db:
      name: "{{ db_name }}"
      state: present
      login_user: root
      login_password: "{{ mysql_root_password }}"

  - name: Create Passbolt DB user
    community.mysql.mysql_user:
      name: "{{ db_user }}"
      password: "{{ db_password }}"
      priv: "{{ db_name }}.*:ALL"
      state: present
      login_user: root
      login_password: "{{ mysql_root_password }}"

  # --------------------------------
  # Dynamically get latest Passbolt release
  # --------------------------------
  - name: Get list of releases from GitHub
    ansible.builtin.uri:
      url: "https://api.github.com/repos/passbolt/passbolt_api/releases"
      return_content: yes
    register: gh_releases

  - name: Parse tar.gz URLs from releases
    ansible.builtin.set_fact:
      passbolt_asset_list: >-
        {{
          gh_releases.json
          | map(attribute='assets')
          | sum(start=[])
          | map(attribute='browser_download_url')
          | select("search", "\\.tar\\.gz$")
          | list
        }}

  - name: Fail if no tar.gz asset found
    ansible.builtin.fail:
      msg: "Could not find any Passbolt tar.gz release in GitHub API results"
    when: passbolt_asset_list | length == 0

  - name: Set newest release URL
    ansible.builtin.set_fact:
      passbolt_release_url: "{{ passbolt_asset_list[0] }}"

  - name: Debug release url
    ansible.builtin.debug:
      msg: "Using Passbolt release at {{ passbolt_release_url }}"

  - name: Download latest Passbolt release
    ansible.builtin.get_url:
      url: "{{ passbolt_release_url }}"
      dest: /tmp/passbolt.tar.gz

  - name: Extract Passbolt
    ansible.builtin.unarchive:
      src: /tmp/passbolt.tar.gz
      dest: /var/www/
      remote_src: yes

  - name: Rename extracted folder
    ansible.builtin.command:
      cmd: mv /var/www/passbolt-ce-* {{ install_dir }}

  - name: Set permissions
    ansible.builtin.file:
      path: "{{ install_dir }}"
      owner: www-data
      group: www-data
      recurse: yes

  # --------------------------------
  # Configure PHP
  # --------------------------------
  - name: Configure PHP timezone
    ansible.builtin.lineinfile:
      path: "/etc/php/{{ php_version }}/fpm/php.ini"
      regexp: '^;?date.timezone'
      line: "date.timezone = {{ php_timezone }}"
    notify: Restart PHP

  # --------------------------------
  # Configure Nginx for reverse proxy
  # --------------------------------
  - name: Configure Nginx
    ansible.builtin.copy:
      dest: /etc/nginx/sites-available/passbolt
      content: |
        server {
            listen 80;
            server_name {{ server_name }};

            root {{ install_dir }}/webroot;
            index index.php;

            location / {
                try_files $uri $uri/ /index.php?$args;
            }

            location ~ \.php$ {
                include snippets/fastcgi-php.conf;
                fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;

                # Required for reverse proxy
                fastcgi_param HTTPS on;
                fastcgi_param HTTP_X_FORWARDED_PROTO https;
            }

            location ~ /\.ht {
                deny all;
            }
        }
    notify: Restart Nginx

  - name: Enable Passbolt site
    ansible.builtin.file:
      src: /etc/nginx/sites-available/passbolt
      dest: /etc/nginx/sites-enabled/passbolt
      state: link

  - name: Remove default nginx site
    ansible.builtin.file:
      path: /etc/nginx/sites-enabled/default
      state: absent

  # --------------------------------
  # Handlers
  # --------------------------------
  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
