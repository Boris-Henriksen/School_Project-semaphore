---
- name: Install Passbolt on Ubuntu 24
  hosts: passbolt
  become: true
  vars:
    mariadb_root_password: "Merc1234!"
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Pass1234!"
    passbolt_install_dir: "/var/www/passbolt"
    passbolt_server_name: "passbolt.dk-prod.lan"
    php_timezone: "Europe/Copenhagen"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required base packages
      ansible.builtin.apt:
        name:
          - software-properties-common
          - lsb-release
          - wget
          - unzip
          - git
          - curl
          - gnupg
        state: present

    - name: Add PHP repository
      ansible.builtin.apt_repository:
        repo: ppa:ondrej/php
        state: present

    - name: Update apt cache after adding PHP repo
      ansible.builtin.apt:
        update_cache: yes

  tasks:

    - name: Install PHP and required extensions dynamically
      ansible.builtin.apt:
        name:
          - php
          - php-cli
          - php-fpm
          - php-mysql
          - php-gd
          - php-mbstring
          - php-curl
          - php-xml
          - php-bcmath
          - php-zip
          - php-intl
          - php-gmp
          - php-gnupg
          - composer
        state: present

    - name: Get installed PHP version
      ansible.builtin.command: php -r "echo PHP_VERSION;"
      register: php_version_raw

    - name: Set PHP major.minor version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_raw.stdout | regex_search('^([0-9]+\\.[0-9]+)') }}"

    - name: Install MariaDB server
      ansible.builtin.apt:
        name: mariadb-server
        state: present

    - name: Ensure Python MySQL library is installed
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-dev
          - libmysqlclient-dev
        state: present

    - name: Install mysqlclient via pip
      ansible.builtin.pip:
        name: mysqlclient
        executable: pip3

    - name: Ensure MariaDB root password is set
      community.mysql.mysql_user:
        login_user: root
        login_password: ""
        name: root
        host_all: true
        password: "{{ mariadb_root_password }}"
        check_implicit_admin: true
        state: present

    - name: Create Passbolt database
      community.mysql.mysql_db:
        login_user: root
        login_password: "{{ mariadb_root_password }}"
        name: "{{ passbolt_db_name }}"
        encoding: utf8mb4
        collation: utf8mb4_unicode_ci
        state: present

    - name: Create Passbolt database user
      community.mysql.mysql_user:
        login_user: root
        login_password: "{{ mariadb_root_password }}"
        name: "{{ passbolt_db_user }}"
        password: "{{ passbolt_db_password }}"
        host: localhost
        priv: "{{ passbolt_db_name }}.*:ALL"
        state: present

    - name: Clone Passbolt repository
      ansible.builtin.git:
        repo: "https://github.com/passbolt/passbolt_api.git"
        dest: "{{ passbolt_install_dir }}"
        version: "stable"
        force: yes

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/cli/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
        state: present

    - name: Configure PHP timezone for FPM
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
        state: present

    - name: Install Passbolt dependencies with composer
      ansible.builtin.shell: >
        COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --no-interaction --optimize-autoloader
      args:
        chdir: "{{ passbolt_install_dir }}"

    - name: Set ownership for Passbolt directory
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ passbolt_server_name }};

              root {{ passbolt_install_dir }}/webroot;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php?$query_string;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
