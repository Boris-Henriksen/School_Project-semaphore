---
- name: Install Passbolt CE on Ubuntu 24
  hosts: passbolt
  become: true
  vars:
    passbolt_install_dir: "/var/www/passbolt"
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Merc1234!"
    mariadb_root_password: "Merc1234!"
    php_timezone: "Europe/Copenhagen"
    server_name: "passbolt.dk-prod.lan"

  tasks:

    # --------------------------
    # Update system and install prerequisites
    # --------------------------
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install basic packages
      ansible.builtin.apt:
        name:
          - gnupg
          - lsb-release
          - curl
          - unzip
          - wget
          - git
          - ca-certificates
          - software-properties-common
        state: present

    # --------------------------
    # Add latest PHP repo and install PHP dynamically
    # --------------------------
    - name: Add Ondřej Surý PHP PPA
      ansible.builtin.apt_repository:
        repo: ppa:ondrej/php
        state: present

    - name: Update apt cache after PHP repo
      ansible.builtin.apt:
        update_cache: yes

    - name: Install latest PHP and extensions
      ansible.builtin.apt:
        name:
          - php8.3-fpm
          - php8.3-cli
          - php8.3-mysql
          - php8.3-gd
          - php8.3-curl
          - php8.3-mbstring
          - php8.3-xml
          - php8.3-bcmath
          - php8.3-gmp
          - php8.3-zip
          - php8.3-intl
          - php8.3-soap
          - php8.3-gnupg   # required by Passbolt
        state: present

    - name: Get installed PHP version
      ansible.builtin.command: php -r "echo PHP_VERSION;"
      register: php_version_raw

    - name: Set PHP major.minor version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_raw.stdout | regex_search('^([0-9]+\\.[0-9]+)') }}"

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
        state: present
      notify: Restart PHP-FPM

    # --------------------------
    # Install MariaDB
    # --------------------------
    - name: Install MariaDB
      ansible.builtin.apt:
        name:
          - mariadb-server
        state: present

    - name: Ensure MariaDB root password is set
      ansible.builtin.shell: |
        sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mariadb_root_password }}'; FLUSH PRIVILEGES;"
      args:
        warn: false

    - name: Create Passbolt database
      ansible.builtin.shell: |
        mysql -uroot -p'{{ mariadb_root_password }}' -e "CREATE DATABASE IF NOT EXISTS {{ passbolt_db_name }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

    - name: Create Passbolt DB user
      ansible.builtin.shell: |
        mysql -uroot -p'{{ mariadb_root_password }}' -e "CREATE USER IF NOT EXISTS '{{ passbolt_db_user }}'@'localhost' IDENTIFIED BY '{{ passbolt_db_password }}'; GRANT ALL PRIVILEGES ON {{ passbolt_db_name }}.* TO '{{ passbolt_db_user }}'@'localhost'; FLUSH PRIVILEGES;"

    # --------------------------
    # Install Nginx
    # --------------------------
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Start and enable Nginx and PHP-FPM
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - "php{{ php_version }}-fpm"

    # --------------------------
    # Install Composer
    # --------------------------
    - name: Install composer
      ansible.builtin.get_url:
        url: https://getcomposer.org/composer-stable.phar
        dest: /usr/local/bin/composer
        mode: '0755'

    # --------------------------
    # Clone Passbolt CE latest
    # --------------------------
    - name: Clone Passbolt repository
      ansible.builtin.git:
        repo: https://github.com/passbolt/passbolt_api.git
        dest: "{{ passbolt_install_dir }}"
        version: master

    # --------------------------
    # Install Passbolt PHP dependencies
    # --------------------------
    - name: Install mysqlclient for Python (avoid Ubuntu 24 apt issues)
      ansible.builtin.pip:
        name: mysqlclient
        executable: pip3

    - name: Install Passbolt dependencies with composer
      ansible.builtin.shell: |
        COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --no-interaction --optimize-autoloader
      args:
        chdir: "{{ passbolt_install_dir }}"

    # --------------------------
    # Configure Nginx site
    # --------------------------
    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};
              root {{ passbolt_install_dir }}/webroot;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php$is_args$args;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version }}-fpm"
        state: restarted
