---
- name: Install Passbolt CE on Ubuntu 24
  hosts: passbolt
  become: true
  vars:
    passbolt_install_dir: "/var/www/passbolt"
    passbolt_db_name: "passbolt"
    passbolt_db_user: "passbolt"
    passbolt_db_password: "Passb0lt123!"
    mysql_root_password: "Merc1234!"
    php_timezone: "Europe/Copenhagen"
    server_name: "passbolt.dk-prod.lan"

  pre_tasks:
    - name: Ensure apt is non-interactive
      ansible.builtin.shell: |
        export DEBIAN_FRONTEND=noninteractive

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist

    - name: Install Python MySQL library
      ansible.builtin.apt:
        name: python3-pymysql
        state: present

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - mariadb-server
          - unzip
          - wget
          - curl
          - git
        state: present

    - name: Add Ondřej Surý PHP repository
      ansible.builtin.apt_repository:
        repo: ppa:ondrej/php
        state: present
        filename: ondrej-php

    - name: Update apt cache after adding PHP repo
      ansible.builtin.apt:
        update_cache: yes

    - name: Get latest PHP version available
      ansible.builtin.shell: "apt-cache search ^php[0-9]\\.[0-9]-fpm | awk '{print $1}' | sort -V | tail -1"
      register: php_version_result
      changed_when: false

    - name: Set PHP version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_result.stdout }}"

    - name: Install PHP and required extensions
      ansible.builtin.apt:
        name:
          - "{{ php_version }}"
          - "{{ php_version }}-fpm"
          - "{{ php_version }}-cli"
          - "{{ php_version }}-mysql"
          - "{{ php_version }}-xml"
          - "{{ php_version }}-mbstring"
          - "{{ php_version }}-curl"
          - "{{ php_version }}-gd"
          - "{{ php_version }}-bcmath"
          - "{{ php_version }}-intl"
          - "{{ php_version }}-gnupg"
        state: present

    - name: Start and enable Nginx and MariaDB
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Ensure MariaDB root password is set
      ansible.builtin.mysql_user:
        login_user: root
        login_password: ''
        user: root
        host: localhost
        password: "{{ mysql_root_password }}"
        check_implicit_admin: yes
        priv: "*.*:ALL,GRANT"
        state: present

    - name: Create Passbolt database
      ansible.builtin.mysql_db:
        name: "{{ passbolt_db_name }}"
        encoding: utf8
        collation: utf8_general_ci
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

    - name: Create Passbolt database user
      ansible.builtin.mysql_user:
        name: "{{ passbolt_db_user }}"
        password: "{{ passbolt_db_password }}"
        priv: "{{ passbolt_db_name }}.*:ALL"
        host: localhost
        state: present
        login_user: root
        login_password: "{{ mysql_root_password }}"

  tasks:
    - name: Download Passbolt CE latest tarball
      ansible.builtin.get_url:
        url: "https://www.passbolt.com/download/passbolt-ce-latest.tar.gz"
        dest: "/tmp/passbolt.tar.gz"
        mode: '0644'

    - name: Extract Passbolt
      ansible.builtin.unarchive:
        src: "/tmp/passbolt.tar.gz"
        dest: "{{ passbolt_install_dir }}"
        remote_src: yes
        creates: "{{ passbolt_install_dir }}/bin"

    - name: Set ownership for Passbolt
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Configure PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
      notify: Restart PHP-FPM

    - name: Install Composer
      ansible.builtin.shell: |
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      args:
        creates: /usr/local/bin/composer

    - name: Install Passbolt dependencies with Composer
      ansible.builtin.shell: >
        COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --no-interaction --optimize-autoloader
      args:
        chdir: "{{ passbolt_install_dir }}"

    - name: Configure Nginx for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ passbolt_install_dir }};
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/{{ php_version }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart Nginx

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "{{ php_version }}-fpm"
        state: restarted
