---
- name: Install Passbolt on Ubuntu 24
  hosts: passbolt
  become: true
  vars:
    passbolt_install_dir: /opt/passbolt
    passbolt_venv_dir: /opt/passbolt/venv
    php_timezone: Europe/Copenhagen
    server_name: passbolt.dk-prod.lan
    mariadb_root_password: "Merc1234!"

  tasks:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential system packages
      ansible.builtin.apt:
        name:
          - wget
          - unzip
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - python3-venv
          - python3-dev
          - libmysqlclient-dev
          - mariadb-server
          - nginx
        state: present

    - name: Add PHP repository dynamically
      ansible.builtin.apt_repository:
        repo: "ppa:ondrej/php"
        state: present

    - name: Update apt cache after adding PHP repo
      ansible.builtin.apt:
        update_cache: yes

    - name: Determine newest PHP version available
      ansible.builtin.shell: >
        apt-cache search php | grep -Po '^php[0-9]+\.[0-9]+-fpm' | sort -V | tail -1
      register: php_version_detect
      changed_when: false

    - name: Set PHP version fact
      ansible.builtin.set_fact:
        php_version: "{{ php_version_detect.stdout }}"

    - name: Install PHP and required extensions
      ansible.builtin.apt:
        name:
          - "{{ php_version }}"
          - "{{ php_version }}-cli"
          - "{{ php_version }}-mysql"
          - "{{ php_version }}-gd"
          - "{{ php_version }}-mbstring"
          - "{{ php_version }}-curl"
          - "{{ php_version }}-xml"
          - "{{ php_version }}-zip"
          - "{{ php_version }}-bcmath"
          - "{{ php_version }}-gnupg"
        state: present

    - name: Start and enable NGINX and MariaDB
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - mariadb

    - name: Ensure MariaDB root password is set
      ansible.builtin.shell: |
        mysql -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mariadb_root_password }}'; FLUSH PRIVILEGES;"
      args:
        warn: false

    - name: Create Passbolt database
      ansible.builtin.shell: |
        mysql -uroot -p'{{ mariadb_root_password }}' -e "CREATE DATABASE IF NOT EXISTS passbolt CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
      args:
        warn: false

    - name: Create Passbolt database user
      ansible.builtin.shell: |
        mysql -uroot -p'{{ mariadb_root_password }}' -e "CREATE USER IF NOT EXISTS 'passbolt'@'localhost' IDENTIFIED BY 'passboltadmin'; GRANT ALL PRIVILEGES ON passbolt.* TO 'passbolt'@'localhost'; FLUSH PRIVILEGES;"
      args:
        warn: false

    - name: Create Passbolt install directory
      ansible.builtin.file:
        path: "{{ passbolt_install_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Create Python virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv "{{ passbolt_venv_dir }}"
        creates: "{{ passbolt_venv_dir }}/bin/activate"

    - name: Upgrade pip in virtualenv
      ansible.builtin.command:
        cmd: "{{ passbolt_venv_dir }}/bin/pip install --upgrade pip"

    - name: Install mysqlclient in virtualenv
      ansible.builtin.command:
        cmd: "{{ passbolt_venv_dir }}/bin/pip install mysqlclient"

    - name: Get latest Passbolt release URL
      ansible.builtin.uri:
        url: https://api.github.com/repos/passbolt/passbolt/releases/latest
        return_content: yes
      register: passbolt_latest

    - name: Set latest Passbolt version and download URL
      ansible.builtin.set_fact:
        passbolt_version: "{{ (passbolt_latest.json.tag_name | regex_replace('v','')) }}"
        passbolt_url: "{{ passbolt_latest.json.assets | selectattr('name','search','passbolt-ce-.*\\.tar\\.gz') | map(attribute='browser_download_url') | first }}"

    - name: Download Passbolt latest release
      ansible.builtin.get_url:
        url: "{{ passbolt_url }}"
        dest: /tmp/passbolt.tar.gz
        mode: '0644'

    - name: Extract Passbolt
      ansible.builtin.unarchive:
        src: /tmp/passbolt.tar.gz
        dest: "{{ passbolt_install_dir }}"
        remote_src: yes
        owner: www-data
        group: www-data

    - name: Set PHP timezone
      ansible.builtin.lineinfile:
        path: "/etc/php/{{ php_version | regex_replace('php','') }}/fpm/php.ini"
        regexp: '^;?date.timezone ='
        line: "date.timezone = {{ php_timezone }}"
      notify: Restart PHP-FPM

    - name: Configure NGINX for Passbolt
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/passbolt
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              root {{ passbolt_install_dir }};
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version | regex_replace('php','') }}-fpm.sock;
              }

              location ~ /\.ht {
                  deny all;
              }
          }
      notify: Restart NGINX

    - name: Enable Passbolt site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/passbolt
        dest: /etc/nginx/sites-enabled/passbolt
        state: link

    - name: Remove default NGINX site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

  handlers:
    - name: Restart NGINX
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: "php{{ php_version | regex_replace('php','') }}-fpm"
        state: restarted
