---
- name: Setup Lab Root CA Automatically
  hosts: CA-openssl  # Replace with your CA host in Semaphore if needed
  become: yes
  gather_facts: yes

  vars:
    ca_dir: /opt/lab-ca
    root_ca_name: rootCA
    country: DK
    state: Denmark
    organization: dk-prod.lan
    root_ca_validity_days: 3650

  tasks:
    - name: Install OpenSSL
      apt:
        name: openssl
        state: present
        update_cache: yes

    - name: Create CA directories
      file:
        path: "{{ ca_dir }}/{{ item }}"
        state: directory
        mode: 0755
      loop:
        - certs
        - private
        - newcerts
        - crl

    - name: Ensure CA serial file exists
      file:
        path: "{{ ca_dir }}/serial"
        state: touch
        mode: '0644'

    - name: Set initial serial value
      lineinfile:
        path: "{{ ca_dir }}/serial"
        line: '1000'

    - name: Initialize CA serial
      copy:
        content: '1000'
        dest: "{{ ca_dir }}/serial"
      args:
        creates: "{{ ca_dir }}/serial"

    - name: Deploy OpenSSL config
      copy:
        content: |
          [ req ]
          default_bits       = 4096
          default_md         = sha256
          prompt             = no
          distinguished_name = req_distinguished_name

          [ req_distinguished_name ]
          C  = {{ country }}
          ST = {{ state }}
          O  = {{ organization }}
          CN = Lab Root CA

          [ v3_ca ]
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid:always,issuer
          basicConstraints = critical, CA:true
          keyUsage = critical, digitalSignature, cRLSign, keyCertSign
        dest: "{{ ca_dir }}/openssl.cnf"
        owner: root
        group: root
        mode: 0644

    - name: Generate Root CA private key
      command: >
        openssl genrsa -out {{ ca_dir }}/private/{{ root_ca_name }}.key 4096
      args:
        creates: "{{ ca_dir }}/private/{{ root_ca_name }}.key"

    - name: Generate Root CA self-signed certificate
      command: >
        openssl req -x509 -new -nodes
        -config {{ ca_dir }}/openssl.cnf
        -key {{ ca_dir }}/private/{{ root_ca_name }}.key
        -sha256 -days {{ root_ca_validity_days }}
        -out {{ ca_dir }}/certs/{{ root_ca_name }}.crt
      args:
        creates: "{{ ca_dir }}/certs/{{ root_ca_name }}.crt"

    - name: Secure Root CA private key
      file:
        path: "{{ ca_dir }}/private/{{ root_ca_name }}.key"
        owner: root
        group: root
        mode: '0600'

    - name: Show completion message
      debug:
        msg: "Lab Root CA generated in {{ ca_dir }} – ready to sign certificates later."
